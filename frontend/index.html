<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅游智能知识库</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --sidebar:  #161b27;
      --card:     #1e2535;
      --border:   #2a3347;
      --accent:   #3b82f6;
      --accent2:  #06b6d4;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --user-bg:  #1d4ed8;
      --bot-bg:   #1e2535;
      --danger:   #ef4444;
      --success:  #22c55e;
      --nav-h:    52px;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===================================================
       顶部导航栏
    =================================================== */
    #top-nav {
      height: var(--nav-h);
      min-height: var(--nav-h);
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 0;
      z-index: 10;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 32px;
      text-decoration: none;
    }
    .nav-logo .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .nav-logo span { font-size: 15px; font-weight: 700; color: var(--text); }

    /* 标签 */
    .nav-tabs {
      display: flex;
      align-items: stretch;
      height: 100%;
      gap: 4px;
    }
    .nav-tab {
      display: flex; align-items: center; gap: 7px;
      padding: 0 18px;
      height: 100%;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      border: none; background: none;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 500;
    }
    .nav-tab .tab-icon { font-size: 15px; }

    /* 右侧工具栏 */
    .nav-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 10px;
    }
    .btn-new-chat {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--accent);
      border: none; border-radius: 7px;
      color: #fff; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-new-chat:hover { opacity: .85; }

    /* ===================================================
       主体（导航栏以下）
    =================================================== */
    #app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ===================================================
       视图切换
    =================================================== */
    .view { display: none; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ===================================================
       智能对话视图
    =================================================== */
    #view-chat {
      flex-direction: row;
    }

    /* 左侧会话列表 */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 14px 10px;
      gap: 10px;
    }

    .section-title {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      color: var(--muted); text-transform: uppercase; padding: 4px 4px 0;
    }

    #session-list {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 3px;
    }
    .session-item {
      padding: 9px 10px; border-radius: 8px; cursor: pointer;
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .15s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .session-item:hover { background: var(--card); }
    .session-item.active {
      background: var(--card);
      border-left: 3px solid var(--accent); padding-left: 7px;
    }
    .session-item .del-btn {
      display: none; background: none; border: none;
      color: var(--danger); cursor: pointer; font-size: 14px; padding: 0 2px;
    }
    .session-item:hover .del-btn { display: block; }

    /* 聊天主区 */
    #chat-main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 24px 32px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* 欢迎屏 */
    #welcome {
      margin: auto; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    #welcome .big-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
    }
    #welcome h2 { font-size: 22px; }
    #welcome p  { color: var(--muted); font-size: 14px; max-width: 400px; line-height: 1.6; }
    .suggest-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      width: 100%; max-width: 500px;
    }
    .suggest-btn {
      padding: 12px 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 13px;
      cursor: pointer; text-align: left; line-height: 1.4;
      transition: border-color .2s, background .2s;
    }
    .suggest-btn:hover { border-color: var(--accent); background: rgba(59,130,246,.08); }

    /* 消息气泡 */
    .msg { display: flex; gap: 12px; max-width: 100%; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; min-width: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .msg.user .avatar  { background: var(--user-bg); }
    .msg.bot  .avatar  { background: linear-gradient(135deg,var(--accent),var(--accent2)); }

    .bubble {
      max-width: 72%; padding: 12px 16px;
      border-radius: 14px; font-size: 14px; line-height: 1.7;
    }
    .msg.user .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: var(--bot-bg); color: var(--text); border-bottom-left-radius: 4px; }

    .bubble h1,.bubble h2,.bubble h3 { margin: 12px 0 6px; font-size: 15px; }
    .bubble p   { margin: 4px 0; }
    .bubble ul,.bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li  { margin: 3px 0; }
    .bubble strong { color: #93c5fd; }
    .bubble code {
      background: rgba(0,0,0,.3); padding: 1px 5px;
      border-radius: 4px; font-size: 12px;
    }
    .bubble pre code { display: block; padding: 10px; overflow-x: auto; }

    .sources {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .source-tag {
      font-size: 11px; padding: 2px 8px;
      background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3);
      border-radius: 20px; color: #93c5fd;
    }

    .cursor::after { content: "▍"; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ---- 引用来源 ---- */
    .sources-section {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .sources-title {
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
    }
    .source-cards { display: flex; flex-direction: column; gap: 7px; }
    .source-card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      cursor: default;
      transition: border-color .15s;
    }
    .source-card:hover { border-color: rgba(59,130,246,.45); }
    .source-card-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .source-idx {
      font-size: 11px; font-weight: 700;
      background: rgba(59,130,246,.2); color: var(--accent2);
      padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
    }
    .source-web .source-idx {
      background: rgba(6,182,212,.15); color: #22d3ee;
    }
    .source-file {
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .source-region {
      font-size: 11px; color: var(--muted); flex-shrink: 0;
    }
    .source-snippet {
      font-size: 12px; color: var(--muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .source-score {
      font-size: 10px; color: var(--muted);
      margin-top: 4px; text-align: right;
    }

    /* ---- 加载状态（检索中 / 思考中）---- */
    .thinking {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      padding: 2px 0;
    }
    .thinking .th-icon { font-size: 16px; }
    .thinking .th-label { flex: 1; }
    .thinking-dots {
      display: inline-flex; gap: 4px; align-items: center;
    }
    .thinking-dots span {
      width: 6px; height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0);   opacity: .4; }
      40%           { transform: translateY(-5px); opacity: 1;  }
    }

    /* 输入栏 */
    #input-area {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
      background: var(--sidebar);
    }
    #input-wrap {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      transition: border-color .2s;
    }
    #input-wrap:focus-within { border-color: var(--accent); }

    #question {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; resize: none;
      max-height: 120px; line-height: 1.5; font-family: inherit;
    }
    #question::placeholder { color: var(--muted); }

    #send-btn {
      width: 36px; height: 36px; min-width: 36px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s;
    }
    #send-btn:hover:not(:disabled) { opacity: .85; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    #input-hint { font-size: 11px; color: var(--muted); margin-top: 6px; padding: 0 4px; }

    /* ===================================================
       导入文档视图
    =================================================== */
    #view-import {
      flex-direction: column;
      background: var(--bg);
      overflow-y: auto;
    }

    .import-container {
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .import-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .import-header p  { color: var(--muted); font-size: 14px; line-height: 1.6; }

    /* 上传区 */
    #upload-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--card);
    }
    #upload-zone:hover, #upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(59,130,246,.06);
    }
    #upload-zone .drop-icon { font-size: 44px; margin-bottom: 14px; }
    #upload-zone .drop-title {
      font-size: 16px; font-weight: 500; margin-bottom: 8px;
    }
    #upload-zone .drop-sub {
      font-size: 13px; color: var(--muted); margin-bottom: 20px;
    }
    #upload-zone .drop-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity .2s;
    }
    #upload-zone .drop-btn:hover { opacity: .85; }
    #file-input { display: none; }

    /* 进度卡片（导入视图内） */
    #import-progress {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      gap: 12px;
      flex-direction: column;
    }
    #import-progress.visible { display: flex; }

    .prog-head {
      display: flex; justify-content: space-between; align-items: center;
    }
    .prog-filename {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 70%;
    }
    .prog-badge {
      font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      background: rgba(59,130,246,.18); color: var(--accent2);
    }
    .prog-badge.done   { background: rgba(34,197,94,.18); color: var(--success); }
    .prog-badge.failed { background: rgba(239,68,68,.18); color: var(--danger); }

    .prog-step-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px;
    }
    .prog-step-label { color: var(--text); }
    .prog-pct { font-size: 15px; font-weight: 700; color: var(--accent); }
    .prog-pct.done   { color: var(--success); }
    .prog-pct.failed { color: var(--danger); }

    .prog-bar-bg {
      width: 100%; height: 8px;
      background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .prog-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .45s ease;
    }
    .prog-bar-fill.done   { background: var(--success); }
    .prog-bar-fill.failed { background: var(--danger); }

    .prog-detail {
      font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prog-detail.ok  { color: var(--success); }
    .prog-detail.err { color: var(--danger); }

    /* 任务历史表 */
    .import-section-title {
      font-size: 13px; font-weight: 600; color: var(--muted);
      letter-spacing: .05em; text-transform: uppercase;
      margin-bottom: -12px;
    }

    #task-table-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    #task-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    #task-table th {
      background: var(--card); padding: 11px 16px;
      text-align: left; font-weight: 500; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    #task-table td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    #task-table tr:last-child td { border-bottom: none; }
    #task-table tr:hover td { background: rgba(255,255,255,.02); }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500;
    }
    .status-badge.success { background: rgba(34,197,94,.15); color: var(--success); }
    .status-badge.running { background: rgba(59,130,246,.15); color: var(--accent2); }
    .status-badge.pending { background: rgba(100,116,139,.15); color: var(--muted); }
    .status-badge.failed  { background: rgba(239,68,68,.15);  color: var(--danger); }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- ===================================================
     顶部导航栏
=================================================== -->
<nav id="top-nav">
  <a class="nav-logo" href="#" onclick="return false;">
    <div class="logo-icon">🗺️</div>
    <span>旅游知识库</span>
  </a>

  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-chat" onclick="switchView('chat')">
      <span class="tab-icon">💬</span> 智能对话
    </button>
    <button class="nav-tab" id="tab-import" onclick="switchView('import')">
      <span class="tab-icon">📂</span> 导入文档
    </button>
  </div>

  <div class="nav-right">
    <button class="btn-new-chat" onclick="newSession()">＋ 新对话</button>
  </div>
</nav>

<!-- ===================================================
     主体
=================================================== -->
<div id="app-body">

  <!-- ======= 智能对话视图 ======= -->
  <div class="view active" id="view-chat">

    <!-- 左侧会话列表 -->
    <div id="sidebar">
      <div class="section-title">会话历史</div>
      <div id="session-list"></div>
    </div>

    <!-- 聊天区 -->
    <div id="chat-main">
      <div id="messages">
        <div id="welcome">
          <div class="big-icon">✈️</div>
          <h2>你好，我是旅游智能助手</h2>
          <p>基于知识库为你提供景点介绍、线路推荐、酒店美食、交通指南等专业旅游咨询服务</p>
          <div class="suggest-grid">
            <button class="suggest-btn" onclick="sendSuggest(this)">🏖️ 三亚有哪些必去景点？</button>
            <button class="suggest-btn" onclick="sendSuggest(this)">🗺️ 推荐一条云南6天旅游线路</button>
            <button class="suggest-btn" onclick="sendSuggest(this)">🏨 三亚亚龙湾有哪些好酒店？</button>
            <button class="suggest-btn" onclick="sendSuggest(this)">🚌 从昆明到大理怎么坐车？</button>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div id="input-wrap">
          <textarea id="question" rows="1" placeholder="输入你的旅游问题…"
            onkeydown="onKeyDown(event)" oninput="autoResize(this)"></textarea>
          <button id="send-btn" onclick="sendMessage()" title="发送 (Enter)">➤</button>
        </div>
        <div id="input-hint">Enter 发送 · Shift+Enter 换行 · 当前会话：<span id="session-badge">新对话</span></div>
      </div>
    </div>
  </div>

  <!-- ======= 导入文档视图 ======= -->
  <div class="view" id="view-import">
    <div class="import-container">

      <div class="import-header">
        <h2>导入知识文档</h2>
        <p>上传 Markdown (.md) 格式的旅游知识文档，系统将自动完成解析、分块、向量化并写入知识库。</p>
      </div>

      <!-- 上传区 -->
      <div id="upload-zone"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event)"
           onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">📄</div>
        <div class="drop-title">拖拽文件到此处，或点击选择文件</div>
        <div class="drop-sub">支持 .md 格式，可同时选择多个文件</div>
        <button class="drop-btn" onclick.stop="document.getElementById('file-input').click()">
          选择文件
        </button>
      </div>
      <input type="file" id="file-input" accept=".md" multiple onchange="uploadFiles(this.files)" />

      <!-- 当前上传进度卡片 -->
      <div id="import-progress">
        <div class="prog-head">
          <div class="prog-filename" id="prog-filename">—</div>
          <span class="prog-badge" id="prog-badge">处理中</span>
        </div>
        <div class="prog-step-row">
          <span class="prog-step-label" id="prog-step-label">等待处理</span>
          <span class="prog-pct" id="prog-pct">0%</span>
        </div>
        <div class="prog-bar-bg">
          <div class="prog-bar-fill" id="prog-bar-fill"></div>
        </div>
        <div class="prog-detail" id="prog-detail"></div>
      </div>

      <!-- 历史任务 -->
      <div class="import-section-title">最近导入记录</div>
      <div id="task-table-wrap">
        <table id="task-table">
          <thead>
            <tr>
              <th>文件名</th>
              <th>状态</th>
              <th>知识块</th>
              <th>提交时间</th>
            </tr>
          </thead>
          <tbody id="task-tbody">
            <tr><td colspan="4" style="text-align:center;color:var(--muted);padding:28px">暂无记录</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div><!-- #app-body -->

<script>
// ============================================================
// 状态
// ============================================================
let currentSessionId = null;
let isStreaming       = false;
let currentView       = 'chat';
marked.setOptions({ breaks: true, gfm: true });

// ============================================================
// 视图切换
// ============================================================
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('tab-' + view).classList.add('active');

  if (view === 'import') {
    refreshTaskTable();
  }
}

// ============================================================
// 会话管理
// ============================================================
function newSession() {
  switchView('chat');
  currentSessionId = crypto.randomUUID();
  document.getElementById('session-badge').textContent = '新对话';
  clearMessages();
  refreshSessions();
}

async function loadSession(sessionId) {
  switchView('chat');
  currentSessionId = sessionId;
  clearMessages();
  document.getElementById('session-badge').textContent = sessionId.slice(0, 8) + '…';

  const resp = await fetch(`/api/chat/history/${sessionId}?max_turns=40`);
  const data = await resp.json();
  (data.messages || []).forEach(m => appendMessage(m.role === 'user' ? 'user' : 'bot', m.content));
  scrollToBottom();
  refreshSessions();
}

async function deleteSession(sessionId, e) {
  e.stopPropagation();
  await fetch(`/api/chat/history/${sessionId}`, { method: 'DELETE' });
  if (currentSessionId === sessionId) {
    currentSessionId = null;
    clearMessages();
  }
  refreshSessions();
}

async function refreshSessions() {
  const resp = await fetch('/api/chat/sessions?limit=30');
  const data = await resp.json();
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  const sessions = data.sessions || [];
  if (!sessions.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 4px">暂无历史会话</div>';
    return;
  }
  sessions.forEach(s => {
    const el = document.createElement('div');
    el.className = 'session-item' + (s.session_id === currentSessionId ? ' active' : '');
    el.innerHTML = `
      <span>💬 ${s.session_id.slice(0,8)}… <small style="color:var(--muted)">(${s.message_count}条)</small></span>
      <button class="del-btn" title="删除" onclick="deleteSession('${s.session_id}', event)">✕</button>
    `;
    el.addEventListener('click', () => loadSession(s.session_id));
    list.appendChild(el);
  });
}

// ============================================================
// 消息渲染
// ============================================================
function clearMessages() {
  const box = document.getElementById('messages');
  box.innerHTML = `
    <div id="welcome">
      <div class="big-icon">✈️</div>
      <h2>你好，我是旅游智能助手</h2>
      <p>基于知识库为你提供景点介绍、线路推荐、酒店美食、交通指南等专业旅游咨询服务</p>
      <div class="suggest-grid">
        <button class="suggest-btn" onclick="sendSuggest(this)">🏖️ 三亚有哪些必去景点？</button>
        <button class="suggest-btn" onclick="sendSuggest(this)">🗺️ 推荐一条云南6天旅游线路</button>
        <button class="suggest-btn" onclick="sendSuggest(this)">🏨 三亚亚龙湾有哪些好酒店？</button>
        <button class="suggest-btn" onclick="sendSuggest(this)">🚌 从昆明到大理怎么坐车？</button>
      </div>
    </div>`;
}

function appendMessage(role, content, sources) {
  const box     = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msg    = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = role === 'user' ? '👤' : '🤖';
  const html   = role === 'bot' ? marked.parse(content || '') : escapeHtml(content);

  let sourcesHtml = '';
  if (sources && sources.length) {
    const tags = sources
      .filter(s => s.attraction_name || s.region || s.source_file)
      .map(s => {
        const label = [s.attraction_name, s.region, s.source_file].filter(Boolean).join(' · ');
        return `<span class="source-tag">📌 ${escapeHtml(label)}</span>`;
      }).join('');
    if (tags) sourcesHtml = `<div class="sources">${tags}</div>`;
  }

  msg.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble">${html}${sourcesHtml}</div>
  `;
  box.appendChild(msg);
  return msg.querySelector('.bubble');
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSources(sources) {
  if (!sources || !sources.length) return '';
  const cards = sources.map((s, i) => {
    const isWeb    = s.content_type === 'web';
    const title    = isWeb
      ? (s.source_file || 'Web 搜索结果')
      : (s.source_file || s.attraction_name || '知识库文档');
    const region   = s.region ? `<span class="source-region">${escapeHtml(s.region)}</span>` : '';
    const snippet  = s.snippet
      ? `<div class="source-snippet">${escapeHtml(s.snippet)}</div>` : '';
    const score    = s.rerank_score > 0
      ? `<div class="source-score">相关度 ${(s.rerank_score * 100).toFixed(1)}%</div>` : '';
    return `
      <div class="source-card ${isWeb ? 'source-web' : ''}">
        <div class="source-card-head">
          <span class="source-idx">${isWeb ? '🌐' : i + 1}</span>
          <span class="source-file">${escapeHtml(title)}</span>
          ${region}
        </div>
        ${snippet}
        ${score}
      </div>`;
  }).join('');
  return `
    <div class="sources-section">
      <div class="sources-title">引用来源</div>
      <div class="source-cards">${cards}</div>
    </div>`;
}

function scrollToBottom() {
  const box = document.getElementById('messages');
  box.scrollTop = box.scrollHeight;
}

// ============================================================
// 发送消息（SSE 流式）
// ============================================================
async function sendMessage() {
  if (isStreaming) return;
  const input    = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;

  if (!currentSessionId) currentSessionId = crypto.randomUUID();

  input.value = '';
  autoResize(input);
  document.getElementById('send-btn').disabled = true;
  isStreaming = true;

  appendMessage('user', question);

  // 创建 bot 气泡，先显示"检索中"加载状态
  const botBubble = appendMessage('bot', '');
  function setThinking(icon, label) {
    botBubble.innerHTML = `
      <div class="thinking">
        <span class="th-icon">${icon}</span>
        <span class="th-label">${label}</span>
        <span class="thinking-dots"><span></span><span></span><span></span></span>
      </div>`;
  }
  setThinking('🔍', '检索知识库');
  scrollToBottom();

  // 2 秒后若还没有内容，切换为"思考中"
  const thinkTimer = setTimeout(() => {
    if (!fullAnswer) setThinking('💭', '思考中');
  }, 2000);

  let fullAnswer = '';
  let pendingSources = [];   // 暂存 sources，等答案完成后一起渲染

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, session_id: currentSessionId }),
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type === 'session_id') {
            currentSessionId = evt.session_id;
            document.getElementById('session-badge').textContent = evt.session_id.slice(0,8) + '…';
          } else if (evt.type === 'sources') {
            // 收到来源列表，先存起来（答案结束后渲染）
            pendingSources = evt.sources || [];
          } else if (evt.type === 'text') {
            if (!fullAnswer) clearTimeout(thinkTimer);
            fullAnswer += evt.content;
            botBubble.innerHTML = marked.parse(fullAnswer);
            botBubble.classList.add('cursor');
            scrollToBottom();
          } else if (evt.type === 'done') {
            botBubble.classList.remove('cursor');
            // 答案生成完毕后追加来源卡片
            if (pendingSources.length) {
              botBubble.innerHTML = marked.parse(fullAnswer) + renderSources(pendingSources);
            }
            scrollToBottom();
          } else if (evt.type === 'error') {
            clearTimeout(thinkTimer);
            botBubble.innerHTML = `<span style="color:var(--danger)">⚠️ ${escapeHtml(evt.message)}</span>`;
            botBubble.classList.remove('cursor');
          }
        } catch {}
      }
    }
  } catch (e) {
    clearTimeout(thinkTimer);
    botBubble.innerHTML = `<span style="color:var(--danger)">⚠️ 网络错误：${escapeHtml(e.message)}</span>`;
    botBubble.classList.remove('cursor');
  }

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  refreshSessions();
}

function sendSuggest(btn) {
  document.getElementById('question').value = btn.textContent.slice(2).trim();
  sendMessage();
}

// ============================================================
// 输入框
// ============================================================
function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ============================================================
// 文件上传 & 进度（导入视图）
// ============================================================
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.add('drag-over');
}
function onDragLeave() {
  document.getElementById('upload-zone').classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files);
}

function showProgress(fileName, stepLabel, pct, detail, state) {
  const prog  = document.getElementById('import-progress');
  const fill  = document.getElementById('prog-bar-fill');
  const badge = document.getElementById('prog-badge');
  const pctEl = document.getElementById('prog-pct');
  const detEl = document.getElementById('prog-detail');

  prog.classList.add('visible');
  document.getElementById('prog-filename').textContent   = fileName;
  document.getElementById('prog-step-label').textContent = stepLabel;
  pctEl.textContent   = pct + '%';
  fill.style.width    = pct + '%';

  fill.className  = 'prog-bar-fill'  + (state === 'done' ? ' done' : state === 'failed' ? ' failed' : '');
  pctEl.className = 'prog-pct'       + (state === 'done' ? ' done' : state === 'failed' ? ' failed' : '');
  badge.className = 'prog-badge'     + (state === 'done' ? ' done' : state === 'failed' ? ' failed' : '');
  badge.textContent = state === 'done' ? '导入完成' : state === 'failed' ? '导入失败' : '处理中';

  detEl.textContent = detail;
  detEl.className   = 'prog-detail' + (state === 'done' ? ' ok' : state === 'failed' ? ' err' : '');
}

async function uploadFiles(files) {
  const mdFiles = Array.from(files).filter(f => f.name.endsWith('.md'));
  if (!mdFiles.length) {
    showProgress('格式错误', '仅支持 .md 文件', 0, '请重新选择文件', 'failed');
    return;
  }

  for (const file of mdFiles) {
    showProgress(file.name, '上传中', 2, '正在发送到服务器…', '');
    const form = new FormData();
    form.append('file', file);
    try {
      const resp = await fetch('/api/ingest/upload', { method: 'POST', body: form });
      const data = await resp.json();
      if (resp.ok) {
        showProgress(file.name, '等待处理', 3, `任务 ${data.task_id.slice(0,8)}… 已提交`, '');
        await pollTaskStatus(data.task_id, file.name);
        refreshTaskTable();
      } else {
        showProgress(file.name, '上传失败', 0, data.detail || '服务器拒绝', 'failed');
      }
    } catch (e) {
      showProgress(file.name, '网络错误', 0, e.message, 'failed');
    }
  }
}

async function pollTaskStatus(taskId, fileName) {
  for (let i = 0; i < 120; i++) {
    await new Promise(r => setTimeout(r, 2000));
    try {
      const resp = await fetch(`/api/ingest/status/${taskId}`);
      if (!resp.ok) continue;
      const d = await resp.json();

      if (d.status === 'success') {
        showProgress(fileName, '导入完成', 100,
          `共 ${d.chunk_count} 个知识块已写入向量库`, 'done');
        refreshTaskTable();
        return;
      }
      if (d.status === 'failed') {
        showProgress(fileName, '导入失败', d.progress || 0,
          d.step_detail || d.error || '未知错误', 'failed');
        refreshTaskTable();
        return;
      }
      showProgress(fileName, d.step_label || d.status, d.progress || 0, d.step_detail || '', '');
    } catch {}
  }
  showProgress(fileName, '超时', 0, '等待后端响应超时，请检查服务', 'failed');
}

// ============================================================
// 历史任务表格
// ============================================================
const STATUS_MAP = { success: '已完成', running: '处理中', pending: '等待中', failed: '失败' };

async function refreshTaskTable() {
  try {
    const resp = await fetch('/api/ingest/tasks');
    const data = await resp.json();
    const tbody = document.getElementById('task-tbody');
    const tasks = data.tasks || [];
    if (!tasks.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:28px">暂无记录</td></tr>';
      return;
    }
    tbody.innerHTML = tasks.map(t => `
      <tr>
        <td>${escapeHtml(t.file_name)}</td>
        <td><span class="status-badge ${t.status}">${STATUS_MAP[t.status] || t.status}</span></td>
        <td>${t.chunk_count || '—'}</td>
        <td style="color:var(--muted)">${t.created_at || '—'}</td>
      </tr>
    `).join('');
  } catch {}
}

// ============================================================
// 初始化
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  refreshSessions();
});
</script>
