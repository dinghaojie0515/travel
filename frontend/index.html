<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅游智能知识库</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== 春天旅游配色 ===== */
    :root {
      --bg:        #f4fbf0;          /* 薄荷草地背景 */
      --sidebar:   #ffffff;          /* 纯白侧边栏 */
      --card:      #ffffff;          /* 白色卡片 */
      --border:    #c8eecc;          /* 嫩绿色边框 */
      --accent:    #2da44e;          /* 春草绿主色 */
      --accent2:   #0ea5e9;          /* 晴空蓝辅色 */
      --accent3:   #f59e0b;          /* 阳光橙点缀 */
      --text:      #1a3a1f;          /* 深林绿文字 */
      --muted:     #6b8f71;          /* 苔藓灰辅文字 */
      --user-bg:   #2da44e;          /* 用户气泡：春草绿 */
      --bot-bg:    #edfbee;          /* 机器人气泡：嫩绿白 */
      --danger:    #dc2626;
      --success:   #16a34a;
      --nav-h:     54px;
      --shadow-sm: 0 1px 4px rgba(45,164,78,.10);
      --shadow-md: 0 4px 16px rgba(45,164,78,.12);
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== 顶部导航栏 ===== */
    #top-nav {
      height: var(--nav-h);
      min-height: var(--nav-h);
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 10;
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      margin-right: 32px; text-decoration: none;
    }
    .nav-logo .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #4ade80);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 2px 8px rgba(45,164,78,.3);
    }
    .nav-logo span { font-size: 15px; font-weight: 700; color: var(--text); }

    .nav-tabs { display: flex; align-items: stretch; height: 100%; gap: 4px; }
    .nav-tab {
      display: flex; align-items: center; gap: 7px;
      padding: 0 18px; height: 100%;
      font-size: 14px; color: var(--muted);
      cursor: pointer; border: none; background: none;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--accent); }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .btn-new-chat {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--accent); border: none; border-radius: 7px;
      color: #fff; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background .2s, box-shadow .2s;
      box-shadow: 0 2px 6px rgba(45,164,78,.35);
    }
    .btn-new-chat:hover { background: #238c3f; box-shadow: 0 4px 12px rgba(45,164,78,.4); }

    /* ===== 主体 ===== */
    #app-body { flex: 1; display: flex; overflow: hidden; }

    .view { display: none; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ===== 智能对话视图 ===== */
    #view-chat { flex-direction: row; }

    #sidebar {
      width: 240px; min-width: 240px;
      background: #ffffff;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 14px 10px; gap: 10px;
    }

    .section-title {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      color: var(--muted); text-transform: uppercase; padding: 4px 4px 0;
    }

    #session-list {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 3px;
    }
    .session-item {
      padding: 9px 10px; border-radius: 8px; cursor: pointer;
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .15s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .session-item:hover { background: #f0fdf4; }
    .session-item.active { background: #dcfce7; border-left: 3px solid var(--accent); padding-left: 7px; }
    .session-item .del-btn {
      display: none; background: none; border: none;
      color: var(--danger); cursor: pointer; font-size: 14px; padding: 0 2px;
    }
    .session-item:hover .del-btn { display: block; }

    #chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 28px 36px;
      display: flex; flex-direction: column; gap: 22px;
    }

    /* 欢迎屏 */
    #welcome {
      margin: auto; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }
    #welcome .big-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), #4ade80);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      box-shadow: var(--shadow-md);
    }
    #welcome h2 { font-size: 22px; color: var(--text); }
    #welcome p  { color: var(--muted); font-size: 14px; max-width: 420px; line-height: 1.7; }
    .suggest-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      width: 100%; max-width: 520px;
    }
    .suggest-btn {
      padding: 12px 14px;
      background: #ffffff; border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 13px;
      cursor: pointer; text-align: left; line-height: 1.5;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      box-shadow: var(--shadow-sm);
    }
    .suggest-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(45,164,78,.18);
      transform: translateY(-1px);
    }

    /* 消息气泡 */
    .msg { display: flex; gap: 12px; max-width: 100%; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px; height: 36px; min-width: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .msg.user .avatar { background: linear-gradient(135deg, var(--accent), #4ade80); box-shadow: 0 2px 6px rgba(45,164,78,.3); }
    .msg.bot  .avatar { background: linear-gradient(135deg, var(--accent2), #67e8f9); box-shadow: 0 2px 6px rgba(14,165,233,.25); }

    .bubble {
      max-width: 72%; padding: 13px 17px;
      border-radius: 16px; font-size: 14px; line-height: 1.75;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, var(--accent), #4ade80);
      color: #fff; border-bottom-right-radius: 4px;
      box-shadow: 0 3px 10px rgba(45,164,78,.25);
    }
    .msg.bot .bubble {
      background: #ffffff; color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .bubble h1,.bubble h2,.bubble h3 { margin: 12px 0 6px; font-size: 15px; color: var(--text); }
    .bubble p   { margin: 4px 0; }
    .bubble ul,.bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li  { margin: 3px 0; }
    .bubble strong { color: var(--accent); }
    .bubble code {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      padding: 1px 5px; border-radius: 4px; font-size: 12px; color: #166534;
    }
    .bubble pre { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; overflow: hidden; margin: 8px 0; }
    .bubble pre code { display: block; padding: 12px; border: none; background: none; }

    /* 引用来源 */
    .sources-section {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .sources-title {
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
    }
    .source-cards { display: flex; flex-direction: column; gap: 7px; }
    .source-card {
      background: #f9fef9;
      border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    .source-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(45,164,78,.12); }
    .source-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .source-idx {
      font-size: 11px; font-weight: 700;
      background: #dcfce7; color: var(--accent);
      padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
    }
    .source-web .source-idx { background: #e0f2fe; color: var(--accent2); }
    .source-file {
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .source-region { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .source-snippet {
      font-size: 12px; color: var(--muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .source-score { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }

    /* ── 步骤追踪面板 ── */
    .think-panel {
      border: 1px solid #bbf7d0; border-radius: 10px;
      margin-bottom: 10px; overflow: hidden; font-size: 12px;
      background: #f0fdf4;
    }
    .think-header {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 12px;
      background: #dcfce7;
      cursor: pointer; user-select: none;
      color: var(--muted); transition: background .15s;
      border-bottom: 1px solid #bbf7d0;
    }
    .think-header:hover { background: #bbf7d0; }
    .think-chevron { font-size: 9px; transition: transform .22s; flex-shrink: 0; color: var(--accent); }
    .think-panel.collapsed .think-chevron { transform: rotate(-90deg); }
    .think-title  { font-weight: 600; color: var(--accent); }
    .think-summary{ margin-left: auto; font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .think-body {
      padding: 8px 12px 10px;
      display: flex; flex-direction: column; gap: 4px;
      max-height: 300px; overflow: hidden;
      transition: max-height .25s ease, padding .25s ease;
    }
    .think-panel.collapsed .think-body { max-height: 0; padding-top: 0; padding-bottom: 0; }

    .step-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
    .step-ico  { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
    .step-lbl  { flex: 1; color: var(--muted); }
    .step-det  { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .step-st   { font-size: 12px; margin-left: 4px; min-width: 14px; text-align: center; flex-shrink: 0; }

    .step-row.running .step-lbl { color: var(--text); font-weight: 500; }
    .step-row.running .step-st  { display: inline-block; color: var(--accent2);
      animation: spin-step .7s linear infinite; }
    .step-row.done    .step-lbl { color: var(--success); }
    .step-row.done    .step-st  { color: var(--success); }
    .step-row.error   .step-lbl { color: var(--danger); }
    .step-row.error   .step-st  { color: var(--danger); }
    @keyframes spin-step { to { transform: rotate(360deg); } }

    .cursor::after { content: "▍"; animation: blink 1s step-end infinite; color: var(--accent); }
    @keyframes blink { 50% { opacity: 0; } }

    /* 输入栏 */
    #input-area {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
      background: #ffffff;
    }
    #input-wrap {
      display: flex; gap: 10px; align-items: flex-end;
      background: #f4fbf0; border: 1.5px solid var(--border);
      border-radius: 14px; padding: 10px 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    #input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,164,78,.12);
    }

    #question {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; resize: none;
      max-height: 120px; line-height: 1.5; font-family: inherit;
    }
    #question::placeholder { color: #9dc9a3; }

    #send-btn {
      width: 36px; height: 36px; min-width: 36px;
      background: var(--accent); border: none; border-radius: 9px;
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, box-shadow .2s;
      box-shadow: 0 2px 6px rgba(45,164,78,.3);
    }
    #send-btn:hover:not(:disabled) { background: #238c3f; box-shadow: 0 4px 10px rgba(45,164,78,.4); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
    #input-hint { font-size: 11px; color: #9dc9a3; margin-top: 6px; padding: 0 4px; }

    /* ===== 导入文档视图 ===== */
    #view-import { flex-direction: column; background: var(--bg); overflow-y: auto; }

    .import-container {
      max-width: 860px; width: 100%;
      margin: 0 auto; padding: 40px 24px 60px;
      display: flex; flex-direction: column; gap: 28px;
    }

    .import-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .import-header p  { color: var(--muted); font-size: 14px; line-height: 1.6; }

    #upload-zone {
      border: 2px dashed #86efac;
      border-radius: 16px; padding: 52px 24px;
      text-align: center; cursor: pointer;
      background: #ffffff;
      transition: border-color .2s, background .2s, box-shadow .2s;
      box-shadow: var(--shadow-sm);
    }
    #upload-zone:hover, #upload-zone.drag-over {
      border-color: var(--accent);
      background: #f0fdf4;
      box-shadow: var(--shadow-md);
    }
    #upload-zone .drop-icon { font-size: 46px; margin-bottom: 14px; }
    #upload-zone .drop-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    #upload-zone .drop-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    #upload-zone .drop-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 22px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background .2s, box-shadow .2s;
      box-shadow: 0 2px 8px rgba(45,164,78,.3);
    }
    #upload-zone .drop-btn:hover { background: #238c3f; box-shadow: 0 4px 14px rgba(45,164,78,.4); }
    #file-input { display: none; }

    /* 进度卡片 */
    #import-progress {
      display: none;
      background: #ffffff; border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 24px;
      gap: 12px; flex-direction: column;
      box-shadow: var(--shadow-sm);
    }
    #import-progress.visible { display: flex; }

    .prog-head { display: flex; justify-content: space-between; align-items: center; }
    .prog-filename {
      font-size: 14px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;
    }
    .prog-badge {
      font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      background: #e0f2fe; color: var(--accent2);
    }
    .prog-badge.done   { background: #dcfce7; color: var(--success); }
    .prog-badge.failed { background: #fee2e2; color: var(--danger);  }

    .prog-step-row {
      display: flex; justify-content: space-between; align-items: center; font-size: 13px;
    }
    .prog-step-label { color: var(--text); }
    .prog-pct { font-size: 15px; font-weight: 700; color: var(--accent); }
    .prog-pct.done   { color: var(--success); }
    .prog-pct.failed { color: var(--danger);  }

    .prog-bar-bg { width: 100%; height: 8px; background: #dcfce7; border-radius: 99px; overflow: hidden; }
    .prog-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), #4ade80);
      border-radius: 99px; transition: width .45s ease;
    }
    .prog-bar-fill.done   { background: var(--success); }
    .prog-bar-fill.failed { background: var(--danger);  }

    .prog-detail {
      font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prog-detail.ok  { color: var(--success); }
    .prog-detail.err { color: var(--danger);  }

    /* 任务历史表 */
    .import-section-title {
      font-size: 13px; font-weight: 600; color: var(--muted);
      letter-spacing: .05em; text-transform: uppercase; margin-bottom: -12px;
    }

    #task-table-wrap { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-sm); }
    #task-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    #task-table th {
      background: #f0fdf4; padding: 11px 16px;
      text-align: left; font-weight: 600; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    #task-table td { padding: 11px 16px; border-bottom: 1px solid #e8f5e9; color: var(--text); background: #ffffff; }
    #task-table tr:last-child td { border-bottom: none; }
    #task-table tr:hover td { background: #f9fef9; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .status-badge.success { background: #dcfce7; color: var(--success); }
    .status-badge.running { background: #e0f2fe; color: var(--accent2); }
    .status-badge.pending { background: #f3f4f6; color: var(--muted);   }
    .status-badge.failed  { background: #fee2e2; color: var(--danger);  }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8eecc; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #86efac; }
  </style>
</head>
<body>

<!-- ===== 顶部导航栏 ===== -->
<nav id="top-nav">
  <a class="nav-logo" href="#" onclick="return false;">
    <div class="logo-icon">🗺️</div>
    <span>旅游知识库</span>
  </a>

  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-chat" onclick="switchView('chat')">
      <span>💬</span> 智能对话
    </button>
    <button class="nav-tab" id="tab-import" onclick="switchView('import')">
      <span>📂</span> 导入文档
    </button>
  </div>

  <div class="nav-right">
    <button class="btn-new-chat" onclick="newSession()">＋ 新对话</button>
  </div>
</nav>

<!-- ===== 主体 ===== -->
<div id="app-body">

  <!-- 智能对话视图 -->
  <div class="view active" id="view-chat">

    <div id="sidebar">
      <div class="section-title">会话历史</div>
      <div id="session-list"></div>
    </div>

    <div id="chat-main">
      <div id="messages">
        <div id="welcome">
          <div class="big-icon">✈️</div>
          <h2>你好，我是旅游智能助手</h2>
          <p>基于知识库为你提供景点介绍、线路推荐、酒店美食、交通指南等专业旅游咨询服务</p>
          <div class="suggest-grid">
            <button class="suggest-btn" onclick="sendSuggest(this)">🏖️ 三亚有哪些必去景点？</button>
            <button class="suggest-btn" onclick="sendSuggest(this)">🗺️ 推荐一条云南6天旅游线路</button>
            <button class="suggest-btn" onclick="sendSuggest(this)">🏨 三亚亚龙湾有哪些好酒店？</button>
            <button class="suggest-btn" onclick="sendSuggest(this)">🚌 从昆明到大理怎么坐车？</button>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div id="input-wrap">
          <textarea id="question" rows="1" placeholder="输入你的旅游问题…"
            onkeydown="onKeyDown(event)" oninput="autoResize(this)"></textarea>
          <button id="send-btn" onclick="sendMessage()" title="发送 (Enter)">➤</button>
        </div>
        <div id="input-hint">Enter 发送 · Shift+Enter 换行 · 当前会话：<span id="session-badge">新对话</span></div>
      </div>
    </div>
  </div>

  <!-- 导入文档视图 -->
  <div class="view" id="view-import">
    <div class="import-container">

      <div class="import-header">
        <h2>导入知识文档</h2>
        <p>上传 Markdown (.md) 格式的旅游知识文档，系统将自动完成解析、分块、向量化并写入知识库。</p>
      </div>

      <div id="upload-zone"
           ondragover="onDragOver(event)" ondragleave="onDragLeave(event)"
           ondrop="onDrop(event)"
           onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">📄</div>
        <div class="drop-title">拖拽文件到此处，或点击选择文件</div>
        <div class="drop-sub">支持 .md 格式，可同时选择多个文件</div>
        <button class="drop-btn">选择文件</button>
      </div>
      <input type="file" id="file-input" accept=".md" multiple onchange="uploadFiles(this.files)" />

      <div id="import-progress">
        <div class="prog-head">
          <div class="prog-filename" id="prog-filename">—</div>
          <span class="prog-badge" id="prog-badge">处理中</span>
        </div>
        <div class="prog-step-row">
          <span class="prog-step-label" id="prog-step-label">等待处理</span>
          <span class="prog-pct" id="prog-pct">0%</span>
        </div>
        <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-bar-fill"></div></div>
        <div class="prog-detail" id="prog-detail"></div>
      </div>

      <div class="import-section-title">最近导入记录</div>
      <div id="task-table-wrap">
        <table id="task-table">
          <thead>
            <tr><th>文件名</th><th>状态</th><th>知识块</th><th>提交时间</th></tr>
          </thead>
          <tbody id="task-tbody">
            <tr><td colspan="4" style="text-align:center;color:var(--muted);padding:28px">暂无记录</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<script>
let currentSessionId = null;
let isStreaming       = false;
let currentView       = 'chat';
marked.setOptions({ breaks: true, gfm: true });

// ── 视图切换
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('tab-' + view).classList.add('active');
  if (view === 'import') refreshTaskTable();
}

// ── 会话管理
function newSession() {
  switchView('chat');
  currentSessionId = crypto.randomUUID();
  document.getElementById('session-badge').textContent = '新对话';
  clearMessages();
  refreshSessions();
}

async function loadSession(sessionId) {
  switchView('chat');
  currentSessionId = sessionId;
  clearMessages();
  document.getElementById('session-badge').textContent = sessionId.slice(0, 8) + '…';
  const resp = await fetch(`/api/chat/history/${sessionId}?max_turns=40`);
  const data = await resp.json();
  (data.messages || []).forEach(m => appendMessage(m.role === 'user' ? 'user' : 'bot', m.content));
  scrollToBottom();
  refreshSessions();
}

async function deleteSession(sessionId, e) {
  e.stopPropagation();
  await fetch(`/api/chat/history/${sessionId}`, { method: 'DELETE' });
  if (currentSessionId === sessionId) { currentSessionId = null; clearMessages(); }
  refreshSessions();
}

async function refreshSessions() {
  try {
    const resp = await fetch('/api/chat/sessions?limit=30');
    const data = await resp.json();
    const list = document.getElementById('session-list');
    list.innerHTML = '';
    const sessions = data.sessions || [];
    if (!sessions.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 4px">暂无历史会话</div>';
      return;
    }
    sessions.forEach(s => {
      const el = document.createElement('div');
      el.className = 'session-item' + (s.session_id === currentSessionId ? ' active' : '');
      el.innerHTML = `
        <span>💬 ${s.session_id.slice(0,8)}… <small style="color:var(--muted)">(${s.message_count}条)</small></span>
        <button class="del-btn" onclick="deleteSession('${s.session_id}', event)">✕</button>`;
      el.addEventListener('click', () => loadSession(s.session_id));
      list.appendChild(el);
    });
  } catch {}
}

// ── 消息渲染
function clearMessages() {
  document.getElementById('messages').innerHTML = `
    <div id="welcome">
      <div class="big-icon">✈️</div>
      <h2>你好，我是旅游智能助手</h2>
      <p>基于知识库为你提供景点介绍、线路推荐、酒店美食、交通指南等专业旅游咨询服务</p>
      <div class="suggest-grid">
        <button class="suggest-btn" onclick="sendSuggest(this)">🏖️ 三亚有哪些必去景点？</button>
        <button class="suggest-btn" onclick="sendSuggest(this)">🗺️ 推荐一条云南6天旅游线路</button>
        <button class="suggest-btn" onclick="sendSuggest(this)">🏨 三亚亚龙湾有哪些好酒店？</button>
        <button class="suggest-btn" onclick="sendSuggest(this)">🚌 从昆明到大理怎么坐车？</button>
      </div>
    </div>`;
}

function appendMessage(role, content) {
  const box     = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const avatar = role === 'user' ? '👤' : '🤖';
  const html   = role === 'bot' ? marked.parse(content || '') : escapeHtml(content);

  msg.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${html}</div>`;
  box.appendChild(msg);
  return msg.querySelector('.bubble');
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSources(sources) {
  if (!sources || !sources.length) return '';
  const cards = sources.map((s, i) => {
    const isWeb   = s.content_type === 'web';
    const title   = isWeb ? (s.source_file || 'Web 搜索结果') : (s.source_file || s.attraction_name || '知识库文档');
    const region  = s.region ? `<span class="source-region">${escapeHtml(s.region)}</span>` : '';
    const snippet = s.snippet ? `<div class="source-snippet">${escapeHtml(s.snippet)}</div>` : '';
    const score   = s.rerank_score > 0 ? `<div class="source-score">相关度 ${(s.rerank_score*100).toFixed(1)}%</div>` : '';
    return `<div class="source-card${isWeb?' source-web':''}">
      <div class="source-card-head">
        <span class="source-idx">${isWeb ? '🌐' : i+1}</span>
        <span class="source-file">${escapeHtml(title)}</span>${region}
      </div>${snippet}${score}</div>`;
  }).join('');
  return `<div class="sources-section"><div class="sources-title">引用来源</div><div class="source-cards">${cards}</div></div>`;
}

function scrollToBottom() {
  const box = document.getElementById('messages');
  box.scrollTop = box.scrollHeight;
}

// ── 步骤追踪面板切换
function toggleThinkPanel(id) {
  const panel = document.getElementById(id);
  if (panel) panel.classList.toggle('collapsed');
}

// ── 发送消息（SSE 流式 + 步骤追踪）
async function sendMessage() {
  if (isStreaming) return;
  const input    = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;

  if (!currentSessionId) currentSessionId = crypto.randomUUID();
  input.value = '';
  autoResize(input);
  document.getElementById('send-btn').disabled = true;
  isStreaming = true;

  appendMessage('user', question);

  // 创建 bot 气泡，内含步骤追踪面板 + 回答区
  const box     = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const msgEl = document.createElement('div');
  msgEl.className = 'msg bot';
  const tpId = 'tp-' + Date.now();
  msgEl.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <div class="think-panel" id="${tpId}">
        <div class="think-header" onclick="toggleThinkPanel('${tpId}')">
          <span class="think-chevron">▼</span>
          <span class="think-title">分析过程</span>
          <span class="think-summary" id="${tpId}-sum">正在分析…</span>
        </div>
        <div class="think-body" id="${tpId}-body"></div>
      </div>
      <div id="${tpId}-ans"></div>
    </div>`;
  box.appendChild(msgEl);
  scrollToBottom();

  const stepMap      = {};  // stepId → DOM element
  let fullAnswer     = '';
  let pendingSources = [];
  let answerStarted  = false;

  function upsertStep(evt) {
    const body = document.getElementById(tpId + '-body');
    if (!body) return;
    let el = stepMap[evt.id];
    if (!el) {
      el = document.createElement('div');
      el.className = 'step-row pending';
      body.appendChild(el);
      stepMap[evt.id] = el;
    }
    el.className = 'step-row ' + (evt.status || 'pending');
    const statusIcon = {running: '⟳', done: '✓', error: '✗'}[evt.status] || '';
    const detail = evt.detail
      ? `<span class="step-det">· ${escapeHtml(evt.detail)}</span>` : '';
    el.innerHTML = `<span class="step-ico">${evt.icon || '•'}</span>`
      + `<span class="step-lbl">${escapeHtml(evt.label)}</span>`
      + detail
      + `<span class="step-st">${statusIcon}</span>`;
    scrollToBottom();
  }

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, session_id: currentSessionId }),
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));

          if (evt.type === 'session_id') {
            currentSessionId = evt.session_id;
            document.getElementById('session-badge').textContent =
              evt.session_id.slice(0, 8) + '…';

          } else if (evt.type === 'step') {
            upsertStep(evt);

          } else if (evt.type === 'sources') {
            pendingSources = evt.sources || [];

          } else if (evt.type === 'text') {
            // 第一片文字到来 → 折叠面板，显示回答区
            if (!answerStarted) {
              answerStarted = true;
              const panel = document.getElementById(tpId);
              if (panel) panel.classList.add('collapsed');
              const sum = document.getElementById(tpId + '-sum');
              if (sum) sum.textContent = '分析完成';
            }
            fullAnswer += evt.content;
            const ansEl = document.getElementById(tpId + '-ans');
            if (ansEl) {
              ansEl.innerHTML = marked.parse(fullAnswer);
              ansEl.classList.add('cursor');
            }
            scrollToBottom();

          } else if (evt.type === 'done') {
            const ansEl = document.getElementById(tpId + '-ans');
            if (ansEl) {
              ansEl.classList.remove('cursor');
              ansEl.innerHTML = marked.parse(fullAnswer)
                + (pendingSources.length ? renderSources(pendingSources) : '');
            }
            const sum = document.getElementById(tpId + '-sum');
            if (sum) {
              const n = Object.keys(stepMap).length;
              sum.textContent = `${n} 个步骤`;
            }
            scrollToBottom();

          } else if (evt.type === 'error') {
            const ansEl = document.getElementById(tpId + '-ans');
            if (ansEl) {
              ansEl.classList.remove('cursor');
              ansEl.innerHTML = `<span style="color:var(--danger)">⚠️ ${escapeHtml(evt.message)}</span>`;
            }
          }
        } catch {}
      }
    }
  } catch (e) {
    const ansEl = document.getElementById(tpId + '-ans');
    if (ansEl) ansEl.innerHTML =
      `<span style="color:var(--danger)">⚠️ 网络错误：${escapeHtml(e.message)}</span>`;
  }

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  refreshSessions();
}

function sendSuggest(btn) {
  document.getElementById('question').value = btn.textContent.slice(2).trim();
  sendMessage();
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── 文件上传
function onDragOver(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag-over'); }
function onDragLeave() { document.getElementById('upload-zone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files);
}

function showProgress(fileName, stepLabel, pct, detail, state) {
  const prog  = document.getElementById('import-progress');
  const fill  = document.getElementById('prog-bar-fill');
  const badge = document.getElementById('prog-badge');
  const pctEl = document.getElementById('prog-pct');
  const detEl = document.getElementById('prog-detail');
  prog.classList.add('visible');
  document.getElementById('prog-filename').textContent   = fileName;
  document.getElementById('prog-step-label').textContent = stepLabel;
  pctEl.textContent = pct + '%';
  fill.style.width  = pct + '%';
  fill.className  = 'prog-bar-fill'  + (state==='done'?' done':state==='failed'?' failed':'');
  pctEl.className = 'prog-pct'       + (state==='done'?' done':state==='failed'?' failed':'');
  badge.className = 'prog-badge'     + (state==='done'?' done':state==='failed'?' failed':'');
  badge.textContent = state==='done' ? '导入完成' : state==='failed' ? '导入失败' : '处理中';
  detEl.textContent = detail;
  detEl.className   = 'prog-detail'  + (state==='done'?' ok':state==='failed'?' err':'');
}

async function uploadFiles(files) {
  const mdFiles = Array.from(files).filter(f => f.name.endsWith('.md'));
  if (!mdFiles.length) { showProgress('格式错误','仅支持 .md 文件',0,'请重新选择','failed'); return; }
  for (const file of mdFiles) {
    showProgress(file.name,'上传中',2,'正在发送到服务器…','');
    const form = new FormData();
    form.append('file', file);
    try {
      const resp = await fetch('/api/ingest/upload', { method: 'POST', body: form });
      const data = await resp.json();
      if (resp.ok) {
        showProgress(file.name,'等待处理',3,`任务 ${data.task_id.slice(0,8)}… 已提交`,'');
        await pollTaskStatus(data.task_id, file.name);
        refreshTaskTable();
      } else {
        showProgress(file.name,'上传失败',0,data.detail||'服务器拒绝','failed');
      }
    } catch (e) { showProgress(file.name,'网络错误',0,e.message,'failed'); }
  }
}

async function pollTaskStatus(taskId, fileName) {
  for (let i = 0; i < 120; i++) {
    await new Promise(r => setTimeout(r, 2000));
    try {
      const resp = await fetch(`/api/ingest/status/${taskId}`);
      if (!resp.ok) continue;
      const d = await resp.json();
      if (d.status === 'success') {
        showProgress(fileName,'导入完成',100,`共 ${d.chunk_count} 个知识块已写入向量库`,'done');
        refreshTaskTable(); return;
      }
      if (d.status === 'failed') {
        showProgress(fileName,'导入失败',d.progress||0,d.step_detail||d.error||'未知错误','failed');
        refreshTaskTable(); return;
      }
      showProgress(fileName, d.step_label||d.status, d.progress||0, d.step_detail||'', '');
    } catch {}
  }
  showProgress(fileName,'超时',0,'等待后端响应超时，请检查服务','failed');
}

// ── 任务表格
const STATUS_MAP = { success:'已完成', running:'处理中', pending:'等待中', failed:'失败' };
async function refreshTaskTable() {
  try {
    const resp = await fetch('/api/ingest/tasks');
    const data = await resp.json();
    const tbody = document.getElementById('task-tbody');
    const tasks = data.tasks || [];
    if (!tasks.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:28px">暂无记录</td></tr>';
      return;
    }
    tbody.innerHTML = tasks.map(t => `
      <tr>
        <td>${escapeHtml(t.file_name)}</td>
        <td><span class="status-badge ${t.status}">${STATUS_MAP[t.status]||t.status}</span></td>
        <td>${t.chunk_count||'—'}</td>
        <td style="color:var(--muted)">${t.created_at||'—'}</td>
      </tr>`).join('');
  } catch {}
}

window.addEventListener('DOMContentLoaded', () => { refreshSessions(); });
</script>
</body>
</html>
